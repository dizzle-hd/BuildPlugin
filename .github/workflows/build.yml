name: Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B

      - name: Upload JAR (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: BuildPlugin
          path: target/BuildPlugin.jar
          retention-days: 30

      # Rolling "latest" release on every push to master.
      # The .jar is attached directly and downloads as a raw .jar (no zip).
      - name: Publish latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "Automatischer Build des neuesten master-Commits. Lade BuildPlugin.jar direkt herunter."
          prerelease: true
          files: target/BuildPlugin.jar

      # Versioned release when you push a tag like v1.0.0
      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/BuildPlugin.jar
          generate_release_notes: true
