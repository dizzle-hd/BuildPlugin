name: BuildPlugin
version: 1.0.0
main: de.julian.buildplugin.BuildPlugin
api-version: "1.21"
description: Build Battle Plugin with queue system and void arena

commands:
  build:
    description: Main BuildPlugin command
    usage: /build <join|leave|queue|test|gui|start|stop|addplayer|status>
    permission: buildplugin.use
  vote:
    description: Vote for a build during voting phase
    usage: /vote <1-5>
    permission: buildplugin.vote

permissions:
  buildplugin.use:
    description: Access to player commands (join, leave, queue, vote)
    default: true
  buildplugin.admin:
    description: Access to admin commands (start, stop, gui, addplayer, test)
    default: op
  buildplugin.vote:
    description: Vote during voting phase
    default: true
